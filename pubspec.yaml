name: just_notes
description: A simple Google Keep-style notes app with end-to-end encryption and pluggable cloud sync.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.7.0
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.4
  uuid: ^4.4.0
  flutter_staggered_grid_view: ^0.7.0
  http: ^1.2.2
  xml: ^7.0.1
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
